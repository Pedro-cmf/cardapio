<!-- CATEGORIAS -->
<div class="categories-header">
  <h2>Categorias</h2>
  <button class="btn btn-primary" (click)="openModal()">
    + Nova Categoria
  </button>
</div>

<div class="categories-list" cdkDropList (cdkDropListDropped)="onDrop($event)">
  <div *ngFor="let cat of categories()" class="category-card" cdkDrag>
    <div class="drag-handle" cdkDragHandle>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <circle cx="7" cy="5" r="1.5"/>
        <circle cx="13" cy="5" r="1.5"/>
        <circle cx="7" cy="10" r="1.5"/>
        <circle cx="13" cy="10" r="1.5"/>
        <circle cx="7" cy="15" r="1.5"/>
        <circle cx="13" cy="15" r="1.5"/>
      </svg>
    </div>
    <div class="category-info">
      <div class="category-main">
        <h3 class="category-name">{{ cat.name }}</h3>
        <span [class]="cat.active ? 'badge badge-active' : 'badge badge-inactive'">
          {{ cat.active ? 'ATIVO' : 'INATIVO' }}
        </span>
      </div>
      <div class="category-meta">
        Ordem: {{ cat.order_index }}
      </div>
    </div>
    <div class="category-actions">
      <button class="btn-secondary" (click)="openModal(cat)">Editar</button>
      <button class="btn-secondary" (click)="toggleActive(cat)">
        {{ cat.active ? 'Desativar' : 'Ativar' }}
      </button>
      <button class="btn-danger" (click)="delete(cat.id)">Excluir</button>
    </div>
  </div>

  <p *ngIf="categories().length === 0" class="empty-state">
    Nenhuma categoria cadastrada. Clique em "Nova Categoria" para começar.
  </p>
</div>

<!-- MODAL -->
<div *ngIf="showModal()" class="modal-backdrop" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editingId() ? 'Editar' : 'Nova' }} Categoria</h3>
      <button class="close-btn" (click)="closeModal()">&times;</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="modal-body">
        <div class="form-field">
          <label for="name">Nome da Categoria</label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="ex: Café da Manhã"
            autofocus
          />
        </div>

        <div class="form-field">
          <label>Ordem de Exibição</label>
          <p style="font-size: 14px; color: var(--color-text-muted); margin: 0;">
            Use o arrasto (drag & drop) na lista para reordenar as categorias
          </p>
        </div>

        <div class="form-field-checkbox">
          <input
            id="active"
            type="checkbox"
            formControlName="active"
          />
          <label for="active">Categoria ativa (visível no cardápio)</label>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">
          Cancelar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading() || form.invalid">
          {{ loading() ? 'Salvando...' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
